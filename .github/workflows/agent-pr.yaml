name: agent-pr

on:
  workflow_dispatch:
    inputs:
      account_name:
        required: true
        type: string
      project_name:
        required: true
        type: string
      app_name:
        required: true
        type: string
      deployment_name:
        required: true
        type: string
      agent_definition:
        required: true
        type: string
        description: "Base64-encoded JSON string of the agent definition"

# 1つのエージェントに対して同時に複数実行しない
concurrency:
  group: agent-pr-${{ github.event.inputs.project_name }}-${{ github.event.inputs.app_name }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Create branch and write file
        id: prepare-branch
        run: |
          set -euo pipefail

          BRANCH=feature/${{ github.event.inputs.project_name }}/${{ github.event.inputs.app_name }}
          git checkout -B "$BRANCH"

          DIRECTORY=agents/projects/${{ github.event.inputs.project_name }}
          mkdir -p "$DIRECTORY"

          FILE="$DIRECTORY/${{ github.event.inputs.app_name }}.json"

          echo "===== PARSED JSON ====="
          printf '%s' "${{ github.event.inputs.agent_definition }}" | base64 --decode | jq .

          printf '%s' "${{ github.event.inputs.agent_definition }}" \
            | base64 --decode \
            | jq . \
            > "$FILE"

          git config user.name bot
          git config user.email bot@users.noreply.github.com

          git add "$FILE"
          if git diff --cached --quiet; then
            echo "No changes to commit"
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"
          git commit -m "Add agent"
          git push --force-with-lease origin HEAD

      - name: Close old PRs for same app_name
        if: steps.prepare-branch.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          APP_NAME='${{ github.event.inputs.app_name }}'
          PROJECT_NAME='${{ github.event.inputs.project_name }}'

          OLD_PRS=$(gh pr list \
            --state open \
            --json number,title,body \
            --jq ".[] | select((.title | contains(\"$APP_NAME\")) or (.body | contains(\"app_name: $APP_NAME\"))) | .number")

          if [ -z "$OLD_PRS" ]; then
            echo "No old PRs found"
            exit 0
          fi

          for PR in $OLD_PRS; do
            echo "Closing old PR #$PR"
            gh pr close "$PR" --comment "Replaced by a newer PR for app_name: $APP_NAME in project: $PROJECT_NAME"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create PR
        if: steps.prepare-branch.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          BODY=$(printf 'project_name: %s\napp_name: %s\ndeployment_name: %s' \
            "${{ github.event.inputs.project_name }}" \
            "${{ github.event.inputs.app_name }}" \
            "${{ github.event.inputs.deployment_name }}")

          gh pr create \
            --title "Update agent ${{ github.event.inputs.app_name }}" \
            --body "$BODY"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
